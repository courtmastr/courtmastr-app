name: CI-CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      should_ci: ${{ steps.detect.outputs.should_ci }}
      ci_mode: ${{ steps.detect.outputs.ci_mode }}
      should_deploy: ${{ steps.detect.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # workflow_dispatch: always run CI, never deploy
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "should_ci=true" >> "$GITHUB_OUTPUT"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Resolve base/head SHAs for both PR and push events
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            base_sha="$(git rev-list --max-parents=0 "$head_sha" | tail -n 1)"
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          printf 'Changed files:\n%s\n' "$changed_files"

          metadata_only_pattern='^(package\.json|package-lock\.json|docs/deployment/LAST_DEPLOY\.md|docs/releases/.*|docs/testing/TEST_CATALOG\.md|docs/testing/TEST_CATALOG\.html|docs/testing/test-run-summary\.json)$'
          ci_mode="skip"

          is_release_metadata_pr=false
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" && "${{ github.head_ref }}" == release-metadata/* ]]; then
            is_release_metadata_pr=true
          fi

          is_release_metadata_push=false
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/master" && "${{ github.event.head_commit.message }}" == *"[skip release]"* ]]; then
            is_release_metadata_push=true
          fi

          metadata_files_only=true
          if [[ -n "$changed_files" ]] && printf '%s\n' "$changed_files" | grep -qvE "$metadata_only_pattern"; then
            metadata_files_only=false
          fi

          if [[ ( "$is_release_metadata_pr" == "true" || "$is_release_metadata_push" == "true" ) && "$metadata_files_only" == "true" ]]; then
            ci_mode="metadata"
          elif printf '%s\n' "$changed_files" | grep -qE '^(src/|functions/|public/|tests/|index\.html$|vite\.config\.|vitest\.config\.|tsconfig|package\.json$|package-lock\.json$|eslint\.config\.)'; then
            ci_mode="full"
          fi

          if [[ "$ci_mode" == "skip" ]]; then
            echo "should_ci=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_ci=true" >> "$GITHUB_OUTPUT"
          fi
          echo "ci_mode=$ci_mode" >> "$GITHUB_OUTPUT"

          # Deploy gate: push to master only, subset of CI paths (no tests/)
          if [[ "${GITHUB_EVENT_NAME}" != "push" || "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$changed_files" | grep -qE '^(src/|functions/|public/|index\.html$|vite\.config\.|vitest\.config\.|tsconfig|package\.json$|package-lock\.json$|firebase\.json$|\.firebaserc$|firestore\.rules$|firestore\.indexes\.json$|storage\.rules$)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  ci:
    name: Lint, Test, Build
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release metadata changes
        if: needs.detect-changes.outputs.ci_mode == 'metadata'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            base_sha="$(git rev-list --max-parents=0 "$head_sha" | tail -n 1)"
          fi

          if ! git rev-parse --verify "${base_sha}^{commit}" >/dev/null 2>&1; then
            if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
              git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"
            else
              git fetch --no-tags origin "${GITHUB_REF_NAME}"
            fi
          fi

          if ! git rev-parse --verify "${base_sha}^{commit}" >/dev/null 2>&1; then
            echo "Unable to resolve base commit ${base_sha} for metadata fast-path diff"
            exit 1
          fi

          changed_files="$(git diff --name-only "${base_sha}...${head_sha}")"
          printf 'Metadata fast-path files:\n%s\n' "$changed_files"

          allowed_pattern='^(package\.json|package-lock\.json|docs/deployment/LAST_DEPLOY\.md|docs/releases/.*|docs/testing/TEST_CATALOG\.md|docs/testing/TEST_CATALOG\.html|docs/testing/test-run-summary\.json)$'
          disallowed_files="$(printf '%s\n' "$changed_files" | grep -vE "$allowed_pattern" || true)"
          if [[ -n "$disallowed_files" ]]; then
            echo "Release metadata fast path received unexpected files:"
            printf '%s\n' "$disallowed_files"
            exit 1
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          package = json.loads(Path("package.json").read_text())
          lock = json.loads(Path("package-lock.json").read_text())
          version = package["version"]

          assert lock["version"] == version, f"package-lock version {lock['version']} != package.json version {version}"
          assert lock["packages"][""]["version"] == version, (
              f"package-lock root package version {lock['packages']['']['version']} != package.json version {version}"
          )

          last_deploy = Path("docs/deployment/LAST_DEPLOY.md").read_text()
          release_id_line = next(
              (line for line in last_deploy.splitlines() if line.startswith("- Release ID: `")),
              None,
          )
          assert release_id_line is not None, "LAST_DEPLOY.md is missing a Release ID line"
          release_id = release_id_line.split("`")[1]

          release_notes = Path(f"docs/releases/{release_id}.md")
          assert release_notes.exists(), f"Missing release notes file: {release_notes}"

          release_contents = release_notes.read_text()
          assert f"Package version: `{version}`" in release_contents, (
              f"Release notes {release_notes} do not mention package version {version}"
          )

          expected_link = f"[docs/releases/{release_id}.md](docs/releases/{release_id}.md)"
          assert expected_link in last_deploy, (
              f"LAST_DEPLOY.md does not link to {release_notes.name}"
          )
          PY

      - name: Setup Node.js
        if: needs.detect-changes.outputs.ci_mode == 'full'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        if: needs.detect-changes.outputs.ci_mode == 'full'
        run: npm ci

      - name: Install functions dependencies
        if: needs.detect-changes.outputs.ci_mode == 'full'
        run: npm ci --prefix functions

      - name: Create production env file
        if: needs.detect-changes.outputs.ci_mode == 'full'
        run: |
          cat > .env.production <<'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_USE_FIREBASE_EMULATOR=false
          EOF

      - name: Lint
        if: needs.detect-changes.outputs.ci_mode == 'full'
        run: npm run lint:check

      - name: Unit tests (CI mode)
        if: needs.detect-changes.outputs.ci_mode == 'full'
        run: npm run test -- --run

      - name: Build
        if: needs.detect-changes.outputs.ci_mode == 'full'
        run: npm run build

  deploy:
    name: Release and Deploy to Firebase
    needs: [detect-changes, ci]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      !contains(github.event.head_commit.message, '[skip release]') &&
      needs.detect-changes.outputs.should_deploy == 'true' &&
      needs.ci.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Create production env file
        run: |
          cat > .env.production <<'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_USE_FIREBASE_EMULATOR=false
          EOF

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: courtmaster-v2
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Preview release plan
        run: npm run release:plan

      - name: Release and deploy
        run: npm run release:deploy

      - name: Commit release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No release metadata changes to commit."
            exit 0
          fi

          git add package.json package-lock.json docs/releases docs/deployment/LAST_DEPLOY.md docs/testing/TEST_CATALOG.md docs/testing/TEST_CATALOG.html docs/testing/test-run-summary.json
          git commit -m "chore: record release metadata [skip release]"

          if git push origin HEAD:master; then
            echo "Release metadata pushed directly to master."
            exit 0
          fi

          metadata_branch="release-metadata/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git push origin HEAD:"${metadata_branch}"

          pr_body="$(printf 'Automated release metadata generated by the CI deploy workflow.\n\n- Source commit: %s\n- Workflow run: %s/%s/actions/runs/%s\n- Reason: protected branch rules rejected the direct push back to `master`\n' \
            "${GITHUB_SHA}" \
            "${GITHUB_SERVER_URL}" \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_RUN_ID}")"

          gh pr create \
            --base master \
            --head "${metadata_branch}" \
            --title "chore: record release metadata [skip release]" \
            --body "${pr_body}"

          gh pr merge \
            --auto \
            --squash \
            "${metadata_branch}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          NOTES_FILE="docs/releases/${TAG}.md"

          if [ ! -f "${NOTES_FILE}" ]; then
            echo "Release notes not found: ${NOTES_FILE}" && exit 1
          fi

          # Extract Summary + Highlights (stop before ## Verification)
          RELEASE_BODY=$(awk '/^## Summary/{start=1} /^## Verification/{start=0} start' "${NOTES_FILE}")
          RELEASE_BODY="${RELEASE_BODY}

          ---
          Live at https://courtmastr.com/"

          # Create and push tag (idempotent)
          if git tag "${TAG}" 2>/dev/null; then
            git push origin "${TAG}"
          else
            echo "Tag ${TAG} already exists, skipping"
          fi

          # Create GitHub Release (idempotent)
          if gh release view "${TAG}" &>/dev/null; then
            echo "Release ${TAG} already exists, skipping"
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes "${RELEASE_BODY}"
          fi
