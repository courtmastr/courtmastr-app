name: CI-CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  deploy-changes:
    name: Detect deploy-affecting changes
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.detect.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deploy-affecting paths
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "push" || "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            base_sha="$(git rev-list --max-parents=0 "$head_sha" | tail -n 1)"
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          printf 'Changed files for deploy gate:\n%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -qE '^(src/|functions/|public/|index\.html$|vite\.config\..*$|vitest\.config\..*$|tsconfig.*\.json$|package\.json$|package-lock\.json$|firebase\.json$|\.firebaserc$|firestore\.rules$|firestore\.indexes\.json$|storage\.rules$)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Create production env file
        run: |
          cat > .env.production <<'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_USE_FIREBASE_EMULATOR=false
          NODE_ENV=production
          EOF

      - name: Lint
        run: npm run lint:check

      - name: Unit tests (CI mode)
        run: npm run test -- --run

      - name: Build
        run: npm run build

  deploy:
    name: Release and Deploy to Firebase
    needs: [deploy-changes, ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[skip release]') && needs.deploy-changes.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Create production env file
        run: |
          cat > .env.production <<'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_USE_FIREBASE_EMULATOR=false
          NODE_ENV=production
          EOF

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: courtmaster-v2
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Preview release plan
        run: npm run release:plan

      - name: Release and deploy
        run: npm run release:deploy

      - name: Commit release metadata
        run: |
          if git diff --quiet; then
            echo "No release metadata changes to commit."
            exit 0
          fi

          git add package.json package-lock.json docs/releases docs/deployment/LAST_DEPLOY.md docs/testing/TEST_CATALOG.md docs/testing/TEST_CATALOG.html docs/testing/test-run-summary.json
          git commit -m "chore: record release metadata [skip release]"
          git push origin HEAD:master
