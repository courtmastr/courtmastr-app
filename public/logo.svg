<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Base Squircle -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" />
  
  <!-- Branches container to ensure glow doesn't get clipped weirdly -->
  <g>
    <!-- Top Left Bracket -->
    <path d="M 160 160 L 240 160 L 240 256" stroke="#FFFFFF" stroke-opacity="0.95" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Bottom Left Bracket -->
    <path d="M 160 352 L 240 352 L 240 256" stroke="#FFFFFF" stroke-opacity="0.95" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Join and Final Bracket -->
    <path d="M 240 256 L 352 256" stroke="#4CAF50" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Player Nodes (Start points) -->
    <circle cx="128" cy="160" r="28" fill="#82B1FF" />
    <circle cx="128" cy="352" r="28" fill="#82B1FF" />
    
    <!-- Final Winner -->
    <circle cx="384" cy="256" r="34" fill="#FFC107" filter="url(#glow)" />
    
    <!-- Inner Final Highlight -->
    <circle cx="384" cy="256" r="16" fill="#FFF8E1" />
  </g>

  <defs>
    <linearGradient id="bgGrad" x1="32" y1="32" x2="480" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1976D2" />
      <stop offset="1" stop-color="#0A3D91" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#FFC107" flood-opacity="0.6" />
    </filter>
  </defs>
</svg>
