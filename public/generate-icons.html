<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CourtMastr Icon Generator</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(140deg, #f3f8ff 0%, #eef4ff 45%, #fdfcf8 100%);
      color: #0f172a;
    }

    .panel {
      width: min(560px, calc(100vw - 32px));
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 16px;
      background: #fff;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(29, 78, 216, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
      font-family: "Barlow Condensed", "Avenir Next Condensed", sans-serif;
      letter-spacing: 0.01em;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.5;
      color: rgba(15, 23, 42, 0.78);
    }

    button {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #1d4ed8 0%, #0ea5e9 70%);
    }

    #status {
      margin-top: 12px;
      font-size: 0.9rem;
      color: rgba(15, 23, 42, 0.68);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>CourtMastr Icon Generator</h1>
    <p>
      Generates favicon, Apple touch, and PWA icons using the CourtMastr blue/amber brand theme.
      Click once and allow multiple downloads in your browser.
    </p>
    <button id="generate">Generate Icons</button>
    <p id="status" aria-live="polite"></p>
  </main>

  <canvas id="canvas" hidden></canvas>

  <script>
    const ICON_OUTPUTS = [
      { size: 16, filename: 'favicon-16x16.png' },
      { size: 32, filename: 'favicon-32x32.png' },
      { size: 180, filename: 'apple-touch-icon.png' },
      { size: 192, filename: 'favicon-192x192.png' },
      { size: 192, filename: 'pwa-192x192.png' },
      { size: 512, filename: 'favicon-512x512.png' },
      { size: 512, filename: 'pwa-512x512.png' }
    ];

    const canvas = document.getElementById('canvas');
    const statusNode = document.getElementById('status');

    function drawBrandIcon(size) {
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#1D4ED8');
      gradient.addColorStop(0.75, '#0EA5E9');
      gradient.addColorStop(1, '#D97706');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      const markInset = size * 0.18;
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = Math.max(2, size * 0.07);
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(markInset, size * 0.25);
      ctx.lineTo(size * 0.5, size * 0.14);
      ctx.lineTo(size - markInset, size * 0.25);
      ctx.lineTo(size * 0.73, size * 0.52);
      ctx.lineTo(size * 0.27, size * 0.52);
      ctx.closePath();
      ctx.stroke();

      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(size * 0.5, size * 0.68, size * 0.1, 0, Math.PI * 2);
      ctx.fill();
    }

    function downloadPng(filename) {
      canvas.toBlob((blob) => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    function generateAllIcons() {
      statusNode.textContent = 'Generating icons...';

      ICON_OUTPUTS.forEach((item, index) => {
        setTimeout(() => {
          drawBrandIcon(item.size);
          downloadPng(item.filename);

          if (index === ICON_OUTPUTS.length - 1) {
            statusNode.textContent = 'Done. Move downloaded files into /public and regenerate favicon.ico if needed.';
          }
        }, index * 220);
      });
    }

    document.getElementById('generate').addEventListener('click', generateAllIcons);
  </script>
</body>
</html>
